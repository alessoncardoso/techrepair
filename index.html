<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechRepair - Assistencia Tecnica e Venda de Smartphones</title>
  <meta name="description" content="Assistencia tecnica especializada e venda de smartphones. Reparo de tela, bateria, conector e mais.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    /* ========== CSS RESET & VARIABLES ========== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #121212;
      --bg-elevated: #1a1a1a;
      --fg: #f5f5f5;
      --fg-secondary: #a0a0a0;
      --card: #1e1e1e;
      --card-fg: #f5f5f5;
      --card-hover: #252525;
      --primary: #F5D300;
      --primary-fg: #121212;
      --primary-hover: #e6c600;
      --secondary: #2a2a2a;
      --secondary-fg: #f5f5f5;
      --muted: #2a2a2a;
      --muted-fg: #888888;
      --border: #2e2e2e;
      --border-light: #3a3a3a;
      --destructive: #ff4d4d;
      --green: #00d26a;
      --radius: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.5);
    }

    /* ========== LIGHT MODE ========== */
    [data-theme="light"] {
      --bg: #f8f8f8;
      --bg-elevated: #ffffff;
      --fg: #1a1a1a;
      --fg-secondary: #555555;
      --card: #ffffff;
      --card-fg: #1a1a1a;
      --card-hover: #f0f0f0;
      --primary: #D4B000;
      --primary-fg: #ffffff;
      --primary-hover: #c0a000;
      --secondary: #f0f0f0;
      --secondary-fg: #1a1a1a;
      --muted: #e8e8e8;
      --muted-fg: #777777;
      --border: #e0e0e0;
      --border-light: #d0d0d0;
      --destructive: #e53935;
      --green: #00b35a;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.06);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
    }
    [data-theme="light"] .navbar {
      background: rgba(248,248,248,0.85);
    }
    [data-theme="light"] .fixed-bottom {
      background: rgba(248,248,248,0.9);
    }
    [data-theme="light"] .service-card-icon,
    [data-theme="light"] .buy-model-card-icon {
      background: rgba(212,176,0,0.1);
    }
    [data-theme="light"] .repair-card.selected {
      background: rgba(212,176,0,0.04);
      box-shadow: 0 0 0 1px rgba(212,176,0,0.2);
    }
    [data-theme="light"] .storage-btn.active {
      background: rgba(212,176,0,0.06);
      box-shadow: 0 0 0 1px rgba(212,176,0,0.2);
    }
    [data-theme="light"] .service-card:hover {
      box-shadow: 0 4px 20px rgba(212,176,0,0.1);
    }
    [data-theme="light"] .buy-model-card:hover {
      box-shadow: 0 4px 20px rgba(212,176,0,0.1);
    }
    [data-theme="light"] .stepper-circle.active {
      box-shadow: 0 0 0 4px rgba(212,176,0,0.2);
    }
    [data-theme="light"] .color-btn.active {
      box-shadow: 0 0 8px rgba(212,176,0,0.3);
    }
    [data-theme="light"] .navbar-search input:focus {
      box-shadow: 0 0 0 2px rgba(212,176,0,0.15);
    }
    [data-theme="light"] ::selection {
      background: rgba(212,176,0,0.3);
    }
    [data-theme="light"] ::-webkit-scrollbar-track {
      background: var(--bg);
    }
    [data-theme="light"] ::-webkit-scrollbar-thumb {
      background: #c0c0c0;
    }
    [data-theme="light"] ::-webkit-scrollbar-thumb:hover {
      background: #a0a0a0;
    }

    /* ========== THEME TOGGLE ========== */
    .theme-toggle {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-full);
      background: var(--secondary);
      border: 1px solid var(--border);
      color: var(--fg);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .theme-toggle:hover {
      background: var(--border-light);
      border-color: var(--primary);
      color: var(--primary);
      transform: rotate(30deg);
    }
    .theme-toggle .icon-sun,
    .theme-toggle .icon-moon {
      transition: opacity 0.3s, transform 0.3s;
    }
    [data-theme="light"] .theme-toggle .icon-moon { display: none; }
    [data-theme="dark"] .theme-toggle .icon-sun,
    :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: none; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    button { cursor: pointer; font-family: inherit; }
    select { font-family: inherit; }

    /* ========== NAVBAR ========== */
    .navbar {
      background: rgba(18,18,18,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .navbar-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 20px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .navbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--fg);
    }
    .navbar-logo-icon {
      width: 38px;
      height: 38px;
      background: var(--primary);
      color: var(--primary-fg);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 17px;
    }
    .navbar-logo-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--fg);
    }
    .navbar-logo-text span { color: var(--primary); }
    .navbar-nav {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }
    .navbar-nav a {
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted-fg);
      transition: color 0.2s;
      position: relative;
    }
    .navbar-nav a:hover, .navbar-nav a.active {
      color: var(--primary);
    }
    .navbar-nav a.active::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--primary);
      border-radius: 1px;
    }
    .navbar-search {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .navbar-search input {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 9px 16px;
      font-size: 13px;
      outline: none;
      width: 240px;
      background: var(--secondary);
      color: var(--fg);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .navbar-search input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(245,211,0,0.15);
    }
    .navbar-search input::placeholder { color: var(--muted-fg); }
    .navbar-search-btn {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-full);
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.15s;
    }
    .navbar-search-btn:hover { background: var(--primary-hover); transform: scale(1.05); }

    @media (max-width: 768px) {
      .navbar-nav { display: none; }
      .navbar-search input { width: 140px; }
    }

    /* ========== STEPPER ========== */
    .stepper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      padding: 36px 16px 28px;
      max-width: 600px;
      margin: 0 auto;
    }
    .stepper-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .stepper-circle {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      border: 2px solid var(--border-light);
      background: var(--card);
      color: var(--muted-fg);
      transition: all 0.3s;
    }
    .stepper-circle.active {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(245,211,0,0.2);
    }
    .stepper-circle.done {
      background: var(--primary);
      color: var(--primary-fg);
      border-color: var(--primary);
    }
    .stepper-label {
      font-size: 12px;
      color: var(--muted-fg);
      font-weight: 500;
      text-align: center;
      white-space: nowrap;
    }
    .stepper-line {
      width: 80px;
      height: 2px;
      background: var(--border-light);
      margin-bottom: 28px;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .stepper-line.done { background: var(--primary); }

    /* ========== COMMON ========== */
    .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }
    .container-sm { max-width: 768px; margin: 0 auto; padding: 0 20px; }
    .container-md { max-width: 960px; margin: 0 auto; padding: 0 20px; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      width: 42px;
      height: 42px;
      justify-content: center;
      transition: all 0.2s;
      color: var(--fg);
    }
    .back-btn:hover { background: var(--border-light); border-color: var(--primary); }

    .btn-primary {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--primary);
      color: var(--primary-fg);
      border: none;
      border-radius: var(--radius);
      padding: 15px 24px;
      font-size: 15px;
      font-weight: 700;
      transition: all 0.2s;
      letter-spacing: -0.01em;
    }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-outline {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: transparent;
      color: var(--fg);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .btn-outline:hover { background: var(--secondary); border-color: var(--primary); color: var(--primary); }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
    }

    .hidden { display: none !important; }

    /* ========== SERVICE SELECTION ========== */
    .service-selection {
      text-align: center;
      padding: 100px 20px;
    }
    .service-selection h2 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--fg);
      letter-spacing: -0.02em;
    }
    .service-selection > p {
      font-size: 16px;
      color: var(--muted-fg);
      margin-bottom: 48px;
    }
    .service-cards {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .service-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      width: 320px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .service-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--primary);
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .service-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(245,211,0,0.1);
      transform: translateY(-2px);
    }
    .service-card:hover::before { transform: scaleX(1); }
    .service-card-icon {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-full);
      background: rgba(245,211,0,0.12);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }
    .service-card h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--fg);
    }
    .service-card p {
      font-size: 14px;
      color: var(--muted-fg);
      line-height: 1.5;
    }

    /* ========== DEVICE SELECTION ========== */
    .device-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }
    .device-header h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .brand-section {
      margin-bottom: 28px;
    }
    .brand-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .device-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .device-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      cursor: pointer;
      transition: all 0.2s;
      font-size: 13px;
      font-weight: 500;
      color: var(--fg);
    }
    .device-card:hover {
      border-color: var(--primary);
      background: var(--card-hover);
      box-shadow: 0 0 0 1px rgba(245,211,0,0.2);
    }
    .device-card svg { color: var(--primary); flex-shrink: 0; opacity: 0.7; }

    /* ========== LAYOUT 2-COL ========== */
    .layout-2col {
      display: flex;
      gap: 32px;
      padding-bottom: 48px;
    }
    .layout-2col .col-main { flex: 1; min-width: 0; }
    .layout-2col .col-sidebar { width: 380px; flex-shrink: 0; }
    .col-sidebar .sticky { position: sticky; top: 84px; }

    @media (max-width: 1024px) {
      .layout-2col { flex-direction: column; }
      .layout-2col .col-sidebar { width: 100%; }
    }

    /* ========== REPAIR CARDS ========== */
    .repair-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .repair-header svg { color: var(--primary); }
    .repair-header-info h2 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .repair-header-info p {
      font-size: 14px;
      color: var(--muted-fg);
    }
    .repair-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
    }
    .repair-hint .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 0 0 6px rgba(245,211,0,0.4);
    }
    .repair-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    @media (max-width: 640px) {
      .repair-grid { grid-template-columns: 1fr; }
    }
    .repair-card {
      display: flex;
      flex-direction: column;
      padding: 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);
      cursor: pointer;
      transition: all 0.25s;
      text-align: left;
      position: relative;
      overflow: hidden;
    }
    .repair-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--primary);
      transform: scaleY(0);
      transition: transform 0.25s;
      transform-origin: top;
    }
    .repair-card:hover {
      border-color: var(--border-light);
      background: var(--card-hover);
    }
    .repair-card.selected {
      border-color: var(--primary);
      background: rgba(245,211,0,0.04);
      box-shadow: 0 0 0 1px rgba(245,211,0,0.15);
    }
    .repair-card.selected::after { transform: scaleY(1); }
    .repair-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .repair-card-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .repair-card-left svg { color: var(--muted-fg); flex-shrink: 0; }
    .repair-card.selected .repair-card-left svg { color: var(--primary); }
    .repair-card-name { font-weight: 600; font-size: 15px; color: var(--fg); }
    .repair-card-time { font-size: 12px; color: var(--muted-fg); }
    .repair-card-note { font-size: 12px; color: var(--muted-fg); }
    .repair-card-price { font-size: 18px; font-weight: 700; color: var(--primary); white-space: nowrap; }
    .repair-card-desc { margin-top: 12px; font-size: 13px; color: var(--muted-fg); line-height: 1.6; }

    /* ========== ORDER SUMMARY ========== */
    .summary-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; color: var(--fg); }
    .summary-device {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      background: var(--bg-elevated);
    }
    .summary-device-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .summary-device-name {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--fg);
    }
    .summary-device-name svg { color: var(--primary); }
    .summary-delete-btn {
      background: none;
      border: none;
      color: var(--destructive);
      padding: 4px;
      transition: opacity 0.2s;
    }
    .summary-delete-btn:hover { opacity: 0.7; }
    .summary-repair-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 3px 0;
      color: var(--fg-secondary);
    }
    .summary-discount { color: var(--green) !important; }
    .summary-discount span { color: var(--green); }
    .summary-subtotal {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      padding-top: 8px;
      color: var(--fg);
    }
    .summary-totals {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .summary-totals-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted-fg);
    }
    .summary-total-final {
      display: flex;
      justify-content: space-between;
      font-size: 20px;
      font-weight: 800;
      margin-top: 16px;
      color: var(--fg);
    }
    .summary-total-final span:last-child { color: var(--primary); }
    .summary-empty {
      text-align: center;
      padding: 16px 0;
      font-size: 14px;
      color: var(--muted-fg);
    }
    .summary-note {
      margin-top: 16px;
      text-align: center;
      font-size: 11px;
      color: var(--muted-fg);
      line-height: 1.5;
      padding: 12px;
      background: var(--bg-elevated);
      border-radius: var(--radius);
    }

    /* ========== CHECKOUT ========== */
    .checkout-back {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted-fg);
      margin-bottom: 24px;
      transition: color 0.2s;
    }
    .checkout-back:hover { color: var(--primary); }
    .checkout-section { margin-bottom: 24px; }
    .checkout-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .checkout-section-header svg { color: var(--primary); }
    .checkout-section-header h3 {
      font-size: 20px;
      font-weight: 700;
      color: var(--primary);
    }
    .checkout-section-desc {
      font-size: 14px;
      color: var(--muted-fg);
      margin-bottom: 16px;
    }
    .checkout-select {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      background: var(--secondary);
      color: var(--fg);
      outline: none;
      appearance: auto;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .checkout-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(245,211,0,0.15);
    }
    .checkout-radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .checkout-radio-label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-size: 14px;
      color: var(--fg);
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      transition: all 0.2s;

    .checkout-radio-label:hover { background: var(--secondary); border-color: var(--border); }
    .checkout-radio-label input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .buy-model-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    @media (max-width: 640px) {
      .buy-model-grid { grid-template-columns: 1fr; }
    }
    .buy-model-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--card);
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .buy-model-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--primary);
      transform: scaleX(0);
      transition: transform 0.3s;
    }
    .buy-model-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 20px rgba(245,211,0,0.1);
      transform: translateY(-2px);
    }
    .buy-model-card:hover::before { transform: scaleX(1); }
    .buy-model-card-icon {
      width: 68px;
      height: 68px;
      border-radius: var(--radius-full);
      background: rgba(245,211,0,0.12);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }
    .buy-model-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 4px; color: var(--fg); }
    .buy-model-card p { font-size: 13px; color: var(--muted-fg); }

      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-elevated);
      border-radius: var(--radius-xl);
      padding: 64px 0;
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }
    .product-phone-mock {
      width: 128px;
      height: 256px;
      border-radius: 24px;
      border: 4px solid;
      display: flex;
      align-items: center;
      justify-content: center;

    }
    .color-selection, .storage-selection {
      text-align: center;
      margin-bottom: 32px;
    }
    .color-selection p, .storage-selection p {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 12px;

    }
    .color-options, .storage-options {

      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .color-btn {

      height: 48px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
    }
    .color-btn.active {

      outline-offset: 0px;
      box-shadow: 0 0 8px rgba(245,211,0,0.3);

    .storage-btn {

      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--card);

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 80px;
    }
    @media (max-width: 640px) {

    }

      background: var(--card);

      border-radius: var(--radius);
      padding: 20px;
    }

      flex-wrap: wrap;
      gap: 8px;
    }

      color: var(--muted-fg);
      line-height: 1.6;
      padding: 2px 8px;
      background: var(--secondary);
      border-radius: 6px;
    }

    .fixed-bottom {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(18,18,18,0.9);

      -webkit-backdrop-filter: blur(16px);
      padding: 16px;
      z-index: 40;

    .fixed-bottom-inner {

    function icon(name, size) {
      const s = size || 20;
      let svg = svgIcons[name] || svgIcons.smartphone;
      return svg.replace(/width="\d+"/, `width="${s}"`).replace(/height="\d+"/, `height="${s}"`);
    }

    // ==========================================
    // STATE
    // ==========================================
    let state = {
      step: 'service-selection',
      orderDevices: [],
      currentDeviceIndex: 0,
      selectedBrandId: '',
      selectedModelId: '',
      selectedRepairs: [],
      selectedBuyModel: null,
      selectedColor: 0,
      selectedVariant: 0,
    };

    function calculateDiscount(repairs) {
      if (repairs.length >= 2) {
        const total = repairs.reduce((s, r) => s + r.price, 0);
        return Math.round(total * 0.10);
      }
      return 0;
    }

    function formatPrice(val) {
      return 'R$' + val.toFixed(2).replace('.', ',');
    }

    function findModel(brandId, modelId) {
      const brand = brands.find(b => b.id === brandId);
      if (!brand) return null;
      for (const fam of brand.families) {
        const m = fam.models.find(m => m.id === modelId);
        if (m) return m;
      }
      return null;
    }

    // ==========================================
    // RENDER ENGINE
    // ==========================================
    function render() {
      const app = document.getElementById('app');
      switch (state.step) {
        case 'service-selection': app.innerHTML = renderServiceSelection(); break;
        case 'device-selection': app.innerHTML = renderDeviceSelection(); break;
        case 'repair-selection': app.innerHTML = renderRepairSelection(); break;
        case 'checkout': app.innerHTML = renderCheckout(); break;
        case 'buy-model-selection': app.innerHTML = renderBuyModelSelection(); break;
        case 'buy-product-detail': app.innerHTML = renderBuyProductDetail(); break;
      }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ==========================================
    // SERVICE SELECTION
    // ==========================================
    function renderServiceSelection() {
      return `
        <section class="service-selection">
          <h2>O que voce precisa?</h2>
          <p>Escolha o servico desejado para comecar</p>
          <div class="service-cards">
            <div class="service-card" onclick="selectService('repair')">
              <div class="service-card-icon">${icon('wrench', 28)}</div>
              <h3>Assistencia Tecnica</h3>
              <p>Reparo de tela, bateria, conector e mais</p>
            </div>
            <div class="service-card" onclick="selectService('buy')">
              <div class="service-card-icon">${icon('smartphone', 28)}</div>
              <h3>Comprar Smartphone</h3>
              <p>Smartphones lacrados, um ano de garantia</p>
            </div>
          </div>
        </section>
      `;
    }

    function selectService(type) {
      state.step = type === 'repair' ? 'device-selection' : 'buy-model-selection';
      render();
    }

    // ==========================================
    // STEPPER
    // ==========================================
    function renderStepper(current) {
      const steps = [{n:1,label:'Selecionar dispositivo'},{n:2,label:'Selecionar reparo'},{n:3,label:'Finalizar pedido'}];
      let html = '<div class="stepper">';
      steps.forEach((s, i) => {
        const done = s.n < current;
        const active = s.n === current;
        const circleClass = done ? 'done' : active ? 'active' : '';
        const content = done ? icon('check', 20) : s.n;
        html += `<div class="stepper-step">
          <div class="stepper-circle ${circleClass}">${content}</div>
          <span class="stepper-label">${s.label}</span>
        </div>`;
        if (i < steps.length - 1) {
          html += `<div class="stepper-line ${done || (active && i === 0 && current > 1) ? 'done' : s.n < current ? 'done' : ''}"></div>`;
        }
      });
      html += '</div>';
      return html;
    }

    // ==========================================
    // ORDER SUMMARY SIDEBAR
    // ==========================================
    function renderOrderSummary() {
      const devices = state.orderDevices;
      const hasDevices = devices.length > 0;
      const hasRepairs = devices.some(d => d.repairs.length > 0);

      let deviceTotals = devices.map(d => {
        const subtotal = d.repairs.reduce((s, r) => s + r.price, 0);
        const discount = calculateDiscount(d.repairs);
        return { subtotal, discount, total: subtotal - discount };
      });
      const grandSubtotal = deviceTotals.reduce((s, d) => s + d.subtotal, 0);
      const grandDiscount = deviceTotals.reduce((s, d) => s + d.discount, 0);
      const grandTotal = grandSubtotal - grandDiscount;

      let html = '<div class="card"><h3 class="summary-title">Resumo do Pedido</h3>';

      if (!hasDevices) {
        html += '<div class="summary-empty"><p>Nenhum dispositivo adicionado</p><p style="margin-top:8px;">Selecione um dispositivo para comecar</p></div>';
      } else {
        devices.forEach((device, idx) => {
          html += `<div class="summary-device">
            <div class="summary-device-header">
              <div class="summary-device-name">${icon('smartphone', 16)} <span>${device.deviceName}</span></div>
              <button class="summary-delete-btn" onclick="removeDevice(${idx})">${icon('trash', 16)}</button>
            </div>`;
          if (device.repairs.length === 0) {
            html += '<p style="font-size:13px;color:var(--muted-fg);margin-top:4px;">Nenhum reparo selecionado</p>';
          } else {
            device.repairs.forEach(r => {
              html += `<div class="summary-repair-row"><span>${r.name}</span><span>R$${r.price.toFixed(2)}</span></div>`;
            });
            if (deviceTotals[idx].discount > 0) {
              html += `<div class="summary-repair-row summary-discount"><span>Desconto (10%)</span><span>-R$${deviceTotals[idx].discount.toFixed(2)}</span></div>`;
            }
            html += `<div class="summary-subtotal"><span>Subtotal</span><span>R$${deviceTotals[idx].total.toFixed(2)}</span></div>`;
          }
          html += '</div>';
        });
      }

      if (hasDevices && hasRepairs) {
        html += '<div class="summary-totals">';
        html += `<div class="summary-totals-row"><span>Subtotal Geral</span><span>R$${grandSubtotal.toFixed(2)}</span></div>`;
        if (grandDiscount > 0) {
          html += `<div class="summary-totals-row summary-discount"><span>Desconto Total</span><span>-R$${grandDiscount.toFixed(2)}</span></div>`;
        }
        html += '</div>';
      }

      html += `<div class="summary-total-final"><span>Total</span><span>${hasRepairs ? 'R$' + grandTotal.toFixed(2) : '-'}</span></div>`;
      html += `<button class="btn-outline" style="margin-top:16px;" onclick="addAnotherDevice()">+ Adicionar outro celular</button>`;
      html += `<button class="btn-primary" style="margin-top:12px;" ${!hasRepairs ? 'disabled' : ''} onclick="goToCheckout()">Etapa Final</button>`;
      html += '<p class="summary-note">A substituicao de componentes gera um aviso de peca trocada nos Ajustes do dispositivo. Isso e normal e nao compromete o desempenho.</p>';
      html += '</div>';
      return html;
    }

    // ==========================================
    // DEVICE SELECTION
    // ==========================================
    function renderDeviceSelection() {
      let html = renderStepper(1);
      html += '<div class="container"><div class="layout-2col"><div class="col-main">';
      html += '<div class="device-header">';
      html += `<button class="back-btn" onclick="goBack('service-selection')">${icon('arrowLeft')}</button>`;
      html += '<h2>Selecione seu Smartphone</h2></div>';

      brands.forEach(brand => {
        brand.families.forEach(family => {
          html += `<div class="brand-section"><div class="brand-title">${brand.name} - ${family.name}</div><div class="device-grid">`;
          family.models.forEach(model => {
            html += `<div class="device-card" onclick="selectDevice('${brand.id}','${model.id}','${model.name.replace(/'/g, "\\'")}','${brand.name}')">${icon('smartphone', 18)} ${model.name}</div>`;
          });
          html += '</div></div>';
        });
      });

      html += '</div><div class="col-sidebar"><div class="sticky">' + renderOrderSummary() + '</div></div></div></div>';
      return html;
    }

    function selectDevice(brandId, modelId, modelName, brandName) {
      state.selectedBrandId = brandId;
      state.selectedModelId = modelId;
      state.selectedRepairs = [];

      const newDevice = { deviceId: modelId, deviceName: modelName, brandName: brandName, repairs: [] };
      if (state.currentDeviceIndex < state.orderDevices.length) {
        state.orderDevices[state.currentDeviceIndex] = newDevice;
      } else {
        state.orderDevices.push(newDevice);
      }
      state.step = 'repair-selection';
      render();
    }

    // ==========================================
    // REPAIR SELECTION
    // ==========================================
    function renderRepairSelection() {
      const model = findModel(state.selectedBrandId, state.selectedModelId);
      if (!model) return '<p>Modelo nao encontrado.</p>';
      const deviceName = state.orderDevices[state.currentDeviceIndex]?.deviceName || '';

      let html = renderStepper(2);
      html += '<div class="container"><div class="layout-2col"><div class="col-main">';

      html += '<div class="repair-header">';
      html += `<button class="back-btn" onclick="goBack('device-selection')">${icon('arrowLeft')}</button>`;
      html += `${icon('smartphone', 32)}`;
      html += `<div class="repair-header-info"><h2>${deviceName}</h2><p>Smartphone</p></div></div>`;

      html += '<div class="repair-hint"><div class="dot"></div> Selecione o <strong>&nbsp;reparo</strong></div>';

      html += '<div class="repair-grid">';
      model.repairs.forEach(repair => {
        const isSelected = state.selectedRepairs.includes(repair.id);
        html += `<div class="repair-card ${isSelected ? 'selected' : ''}" onclick="toggleRepair('${repair.id}')">
          <div class="repair-card-top">
            <div class="repair-card-left">
              ${icon(repair.icon)}
              <div>
                <div class="repair-card-name">${repair.name}</div>
                <div class="repair-card-time">${repair.duration}</div>
                ${repair.note ? `<div class="repair-card-note">${repair.note}</div>` : ''}
              </div>
            </div>
            <div class="repair-card-price">R$${repair.price}</div>
          </div>
          <div class="repair-card-desc">${repair.description}</div>
        </div>`;
      });
      html += '</div></div>';

      html += '<div class="col-sidebar"><div class="sticky">' + renderOrderSummary() + '</div></div></div></div>';
      return html;
    }

    function toggleRepair(repairId) {
      if (state.selectedRepairs.includes(repairId)) {
        state.selectedRepairs = state.selectedRepairs.filter(id => id !== repairId);
      } else {
        state.selectedRepairs.push(repairId);
      }

      const model = findModel(state.selectedBrandId, state.selectedModelId);
      if (model && state.orderDevices[state.currentDeviceIndex]) {
        state.orderDevices[state.currentDeviceIndex].repairs = model.repairs
          .filter(r => state.selectedRepairs.includes(r.id))
          .map(r => ({ id: r.id, name: r.name, price: r.price }));
      }
      render();
    }

    // ==========================================
    // CHECKOUT
    // ==========================================
    function renderCheckout() {
      const devices = state.orderDevices;
      const deviceTotals = devices.map(d => {
        const subtotal = d.repairs.reduce((s, r) => s + r.price, 0);
        const discount = calculateDiscount(d.repairs);
        return { subtotal, discount, total: subtotal - discount };
      });
      const grandSubtotal = deviceTotals.reduce((s, d) => s + d.subtotal, 0);
      const grandDiscount = deviceTotals.reduce((s, d) => s + d.discount, 0);
      const grandTotal = grandSubtotal - grandDiscount;

      let html = renderStepper(3);
      html += '<div class="container-sm" style="padding-bottom:48px;">';

      html += `<button class="checkout-back" onclick="goBack('repair-selection')">${icon('arrowLeft')} Voltar</button>`;

      html += '<div class="card checkout-section">';
      html += '<h3 style="font-size:20px;font-weight:700;margin-bottom:4px;color:var(--fg);">Resumo do Pedido</h3>';
      html += `<p style="font-size:14px;color:var(--muted-fg);margin-bottom:16px;">${devices.length} dispositivo(s)</p>`;

      devices.forEach((device, idx) => {
        html += `<div style="margin-bottom:16px;"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px;font-weight:600;color:var(--fg);">${icon('smartphone', 16)} ${device.deviceName}</div>`;
        device.repairs.forEach(r => {
          html += `<div class="summary-repair-row"><span>${r.name}</span><span>R$${r.price.toFixed(2)}</span></div>`;
        });
        if (deviceTotals[idx].discount > 0) {
          html += `<div class="summary-repair-row summary-discount"><span>Desconto (10%)</span><span>-R$${deviceTotals[idx].discount.toFixed(2)}</span></div>`;
        }
        html += `<div class="summary-subtotal"><span>Subtotal</span><span>R$${deviceTotals[idx].total.toFixed(2)}</span></div>`;
        html += '</div>';
      });

      html += '<div style="border-top:1px solid var(--border);padding-top:16px;margin-top:8px;">';
      html += `<div class="summary-totals-row"><span>Subtotal Geral</span><span>R$${grandSubtotal.toFixed(2)}</span></div>`;
      if (grandDiscount > 0) {
        html += `<div class="summary-totals-row summary-discount"><span>Desconto Total</span><span>-R$${grandDiscount.toFixed(2)}</span></div>`;
      }
      html += `<div class="summary-total-final" style="margin-top:8px;"><span>Total</span><span>R$${grandTotal.toFixed(2)}</span></div>`;
      html += '</div></div>';

      html += '<div class="card checkout-section">';
      html += `<div class="checkout-section-header">${icon('mapPin')} <h3>Endereco</h3></div>`;
      html += '<p class="checkout-section-desc">Informe sua localizacao para prosseguir</p>';
      html += '<label style="display:block;font-size:14px;font-weight:600;margin-bottom:8px;color:var(--fg);">Selecione o Estado</label>';
      html += '<select class="checkout-select" id="estadoSelect" onchange="updateEstado(this.value)"><option value="">Selecione o Estado</option>';
      ESTADOS_BR.forEach(e => { html += `<option value="${e}">${e}</option>`; });
      html += '</select></div>';

      html += '<div class="card checkout-section">';
      html += `<div class="checkout-section-header">${icon('creditCard')} <h3>Forma de Pagamento</h3></div>`;
      html += '<p class="checkout-section-desc">Pagamento e feito apos o reparo</p>';
      html += '<div class="checkout-radio-group">';
      [
        {value:'dinheiro',label:'Dinheiro'},
        {value:'pix',label:'Pix'},
        {value:'debito',label:'Debito (3,95% Acrescimo)'},
        {value:'credito',label:'Credito (Sujeito a acrescimo)'}
      ].forEach(opt => {
        html += `<label class="checkout-radio-label"><input type="radio" name="pagamento" value="${opt.value}" onchange="updatePagamento(this.value)"> ${opt.label}</label>`;
      });
      html += '</div></div>';

      html += `<button class="btn-primary" onclick="sendWhatsApp()">${icon('messageCircle')} Enviar pelo WhatsApp</button>`;
      html += '</div>';
      return html;
    }

    let checkoutEstado = '';
    let checkoutPagamento = '';

    function updateEstado(val) { checkoutEstado = val; }
    function updatePagamento(val) { checkoutPagamento = val; }

    function sendWhatsApp() {
      const devices = state.orderDevices;
      const deviceTotals = devices.map(d => {
        const subtotal = d.repairs.reduce((s, r) => s + r.price, 0);
        const discount = calculateDiscount(d.repairs);
        return { subtotal, discount, total: subtotal - discount };
      });
      const grandSubtotal = deviceTotals.reduce((s, d) => s + d.subtotal, 0);
      const grandDiscount = deviceTotals.reduce((s, d) => s + d.discount, 0);
      const grandTotal = grandSubtotal - grandDiscount;

      let msg = 'Ola! Gostaria de fazer um orcamento de reparo:\n\n';
      devices.forEach((device, i) => {
        msg += `*${device.deviceName}* (${device.brandName})\n`;
        device.repairs.forEach(r => { msg += `  - ${r.name}: R$${r.price.toFixed(2)}\n`; });
        if (deviceTotals[i].discount > 0) msg += `  - Desconto (10%): -R$${deviceTotals[i].discount.toFixed(2)}\n`;
        msg += `  Subtotal: R$${deviceTotals[i].total.toFixed(2)}\n\n`;
      });
      msg += `*Total: R$${grandTotal.toFixed(2)}*\n`;
      if (checkoutEstado) msg += `Estado: ${checkoutEstado}\n`;
      if (checkoutPagamento) msg += `Pagamento: ${checkoutPagamento}\n`;
      window.open('https://wa.me/5500000000000?text=' + encodeURIComponent(msg), '_blank');
    }

    // ==========================================
    // BUY MODEL SELECTION
    // ==========================================
    function renderBuyModelSelection() {
      let html = '<div class="container-md" style="padding:32px 20px 48px;">';
      html += '<div class="device-header">';
      html += `<button class="back-btn" onclick="goBack('service-selection')">${icon('arrowLeft')}</button>`;
      html += '<h2>Escolha o modelo</h2></div>';
      html += '<div class="buy-model-grid">';
      buyModels.forEach((m, i) => {
        html += `<div class="buy-model-card" onclick="selectBuyModel(${i})">
          <div class="buy-model-card-icon">${icon('smartphone', 28)}</div>
          <h3>${m.name}</h3>
          <p>Tela ${m.screenSize}</p>
        </div>`;
      });
      html += '</div></div>';
      return html;
    }

    function selectBuyModel(index) {
      state.selectedBuyModel = buyModels[index];
      state.selectedColor = 0;
      state.selectedVariant = 0;
      state.step = 'buy-product-detail';
      render();
    }

    // ==========================================
    // BUY PRODUCT DETAIL
    // ==========================================
    function renderBuyProductDetail() {
      const m = state.selectedBuyModel;
      if (!m) return '';

      const color = m.colors[state.selectedColor];
      const variant = m.variants[state.selectedVariant];

      let html = '<div class="container-md" style="padding:32px 20px 48px;">';

      html += '<div class="repair-header">';
      html += `<button class="back-btn" onclick="goBack('buy-model-selection')">${icon('arrowLeft')}</button>`;
      html += `${icon('smartphone', 32)}`;
      html += `<div class="repair-header-info"><h2>${m.name}</h2><p style="color:var(--green);font-weight:500;">${m.subtitle}</p></div></div>`;

      html += `<div class="product-visual">
        <div class="product-phone-mock" style="border-color:${color.hex};background:${color.hex}20;">
          ${icon('smartphone', 64).replace('stroke="currentColor"', `stroke="${color.hex}"`)}
        </div>
      </div>`;

      html += '<div class="color-selection"><p>Cor - ' + color.name + '</p><div class="color-options">';
      m.colors.forEach((c, i) => {
        html += `<button class="color-btn ${state.selectedColor === i ? 'active' : ''}" style="background:${c.hex};" title="${c.name}" onclick="selectColor(${i})"></button>`;
      });
      html += '</div></div>';

      html += `<div class="storage-selection"><p>Memoria - ${variant.storage}</p><div class="storage-options">`;
      m.variants.forEach((v, i) => {
        html += `<button class="storage-btn ${state.selectedVariant === i ? 'active' : ''}" onclick="selectVariant(${i})">
          <div class="storage-btn-size">${v.storage}</div>
          <div class="storage-btn-price">R$${v.price.toLocaleString('pt-BR')},00</div>
        </button>`;
      });
      html += '</div></div>';

      html += '<div class="specs-grid">';
      const specSections = [
        { key:'screen', iconKey:'screen', title:'Tela' },
        { key:'chip', iconKey:'cpu', title:'Chip' },
        { key:'camera', iconKey:'camera', title:'Camera' },
        { key:'battery', iconKey:'batterySpec', title:'Bateria' },
        { key:'resistance', iconKey:'shield', title:'Resistencia' },
        { key:'resources', iconKey:'layers', title:'Recursos' },
      ];
      specSections.forEach(s => {
        const spec = m.specs[s.key];
        html += `<div>
          <div class="spec-section-title">${icon(s.iconKey)} ${s.title}</div>
          <div class="spec-card">
            <div class="spec-card-main">${spec.title}</div>
            ${spec.features.length > 0 ? '<div class="spec-card-features">' + spec.features.map(f => `<span>${f}</span>`).join('') + '</div>' : ''}
          </div>
        </div>`;
      });
      html += '</div>';

      html += `<div class="fixed-bottom"><div class="fixed-bottom-inner">
        <button class="btn-primary" onclick="buyWhatsApp()">
          ${icon('messageCircle')} Finalizar compra via WhatsApp
        </button>
      </div></div>`;

      html += '</div>';
      return html;
    }

    function selectColor(i) { state.selectedColor = i; render(); }
    function selectVariant(i) { state.selectedVariant = i; render(); }

    function buyWhatsApp() {
      const m = state.selectedBuyModel;
      const variant = m.variants[state.selectedVariant];
      const color = m.colors[state.selectedColor];
      const msg = encodeURIComponent(
        `Ola! Tenho interesse no *${m.name}*\nCor: ${color.name}\nArmazenamento: ${variant.storage}\nPreco: R$${variant.price.toLocaleString('pt-BR')},00\n\nPoderia me dar mais informacoes?`
      );
      window.open('https://wa.me/5500000000000?text=' + msg, '_blank');
    }

    // ==========================================
    // NAVIGATION HELPERS
    // ==========================================
    function goHome() {
      state.step = 'service-selection';
      state.orderDevices = [];
      state.currentDeviceIndex = 0;
      state.selectedRepairs = [];
      render();
    }

    function goBack(step) {
      state.step = step;
      render();
    }

    function removeDevice(index) {
      state.orderDevices.splice(index, 1);
      if (state.currentDeviceIndex >= state.orderDevices.length && state.currentDeviceIndex > 0) {
        state.currentDeviceIndex--;
      }
      render();
    }

    function addAnotherDevice() {
      state.currentDeviceIndex = state.orderDevices.length;
      state.selectedRepairs = [];
      state.selectedBrandId = '';
      state.selectedModelId = '';
      state.step = 'device-selection';
      render();
    }

    function goToCheckout() {
      if (state.orderDevices.some(d => d.repairs.length > 0)) {
        checkoutEstado = '';
        checkoutPagamento = '';
        state.step = 'checkout';
        render();
      }
    }

    function handleSearch(value) {}
    function handleSearchClick() {
      const val = document.getElementById('searchInput').value.toLowerCase();
      if (!val) return;
      state.step = 'device-selection';
      render();
    }

    // ==========================================
    // THEME TOGGLE
    // ==========================================
    function getPreferredTheme() {
      const saved = localStorage.getItem('techrepair-theme');
      if (saved) return saved;
      return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('techrepair-theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme') || 'dark';
      const next = current === 'dark' ? 'light' : 'dark';
      applyTheme(next);
    }

    // Apply saved theme immediately
    applyTheme(getPreferredTheme());

    // Listen for OS theme changes
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
      if (!localStorage.getItem('techrepair-theme')) {
        applyTheme(e.matches ? 'light' : 'dark');
      }
    });

    // ==========================================
    // INIT
    // ==========================================
    render();
  </script>

</body>
</html>
